<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .payment-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .payment-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-pay {
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="payment-container">
            <h2 class="payment-header">Complete Your Payment</h2>

            <!-- Display Product Name & Price -->
            <h4 id="product-name"></h4>
            <p>Price: <strong id="product-price"></strong></p>

            <!-- Payment Form -->
            <form id="payment-form">
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
                </div>

               
                <!-- Payment Options -->
                <div class="mb-3">
                    <label class="form-label">Select Payment Method</label>
                    <select id="payment-method" class="form-select">
                        <option value="card">Credit/Debit Card</option>
                        <option value="upi">UPI Payment</option>
                    </select>
                </div>

                <!-- Card Payment Section -->
                <div id="card-details" class="payment-method">
                    <div class="mb-3">
                        <label for="card-number" class="form-label">Card Number</label>
                        <input type="text" class="form-control" id="card-number" placeholder="1234 5678 9012 3456" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <label for="expiry" class="form-label">Expiry Date</label>
                            <input type="text" class="form-control" id="expiry" placeholder="MM/YY" required>
                        </div>
                        <div class="col-md-6">
                            <label for="cvv" class="form-label">CVV</label>
                            <input type="text" class="form-control" id="cvv" placeholder="123" required>
                        </div>
                    </div>
                </div>

                <!-- UPI Payment Section -->
                <div id="upi-details" class="payment-method" style="display: none;">
                    <label for="upi-id" class="form-label">UPI ID</label>
                    <input type="text" class="form-control" id="upi-id" placeholder="yourupi@bank" required>
                </div>

                <!-- Pay Now Button -->
                <button type="button" class="btn btn-primary btn-pay" id="pay-now">Pay Now</button>
            </form>
        </div>
    </div>

    <script>
        // Fetch Product Name & Price from URL
        document.addEventListener("DOMContentLoaded", function () {
            const urlParams = new URLSearchParams(window.location.search);
            let productName = urlParams.get("product");
            let price = urlParams.get("price");

            if (productName && price) {
                document.getElementById("product-name").innerText = productName;
                document.getElementById("product-price").innerText = "$" + price;
            }
        });

        // Toggle Payment Method Visibility
        document.getElementById("payment-method").addEventListener("change", function () {
            let selectedMethod = this.value;
            if (selectedMethod === "card") {
                document.getElementById("card-details").style.display = "block";
                document.getElementById("upi-details").style.display = "none";
            } else if (selectedMethod === "upi") {
                document.getElementById("card-details").style.display = "none";
                document.getElementById("upi-details").style.display = "block";
            }
        });

        // Simulate Payment Processing
        document.getElementById("pay-now").addEventListener("click", function () {
            let selectedMethod = document.getElementById("payment-method").value;
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let price = document.getElementById("product-price").innerText;

            if (!name || !email) {
                alert("Please enter all required details.");
                return;
            }

            if (selectedMethod === "card") {
                let cardNumber = document.getElementById("card-number").value;
                let expiry = document.getElementById("expiry").value;
                let cvv = document.getElementById("cvv").value;
                
                if (!cardNumber || !expiry || !cvv) {
                    alert("Please enter valid card details.");
                    return;
                }
            } else if (selectedMethod === "upi") {
                let upiId = document.getElementById("upi-id").value;
                if (!upiId) {
                    alert("Please enter a valid UPI ID.");
                    return;
                }
            }

            // Simulated Success Message
            alert("Payment of " + price + " successful using " + selectedMethod.toUpperCase());
            window.location.href = "thank-you.html"; // Redirect to a thank-you page after payment
        });
    </script>

</body>
</html>
