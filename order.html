<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laundryaa - Order Dry Cleaning</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1,h2{
    text-align:center;
    color:#00796b;
}

label{
    font-weight:bold;
}

select,input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:5px;
    border:1px solid #00796b;
}

button{
    background:#00796b;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#004d40;
}

.cart-box{
    background:#f0f0f0;
    padding:10px;
    border-radius:5px;
}

.cart-box li{
    padding:5px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>Order Dry Cleaning</h1>

<form id="orderForm" action="order.php" method="POST">

<!-- STEP 1 -->
<h2>Step 1: Select Service</h2>

<label>Clothing</label>
<select id="clothing" onchange="updateItems()">
<option value="">Select</option>
<option value="Shirt">Shirt</option>
<option value="T-Shirt">T-Shirt</option>
<option value="Pants">Pants</option>
<option value="Jeans">Jeans</option>
<option value="0ther">Otherwise</option>
</select>

<label>Special Items</label>
<select id="special">
<option value="">Select</option>
<option value="Silk Dress">Silk Dress</option>
<option value="Wool Sweater">Wool Sweater</option>
<option value="Cashmere Scarf">Cashmere Scarf</option>
</select>

<!-- STEP 2 -->
<h2>Step 2: Add Items</h2>

<label>Item</label>
<select id="itemSelect">
<option value="">Choose item</option>
</select>

<label>Quantity</label>
<input type="number" id="qty" min="1" value="1">

<button type="button" onclick="addToCart()">Add Item</button>

<div class="cart-box">
<ul id="cart"></ul>
</div>

<input type="hidden" name="cartData" id="cartData">

<!-- STEP 3 -->
<h2>Step 3: Address</h2>

<input type="text" name="name" placeholder="Full Name" required>
<input type="text" name="phone" placeholder="Phone Number" required>
<input type="text" name="address" placeholder="Delivery Address" required>

<!-- STEP 4 -->
<h2>Step 4: Submit</h2>
<button type="submit">Place Order</button>

</form>
</div>

<script>
let cart = [];

function updateItems(){
    let clothing = document.getElementById("clothing").value;
    let dropdown = document.getElementById("itemSelect");

    dropdown.innerHTML = '<option value="">Choose item</option>';

    if(clothing){
        let opt = document.createElement("option");
        opt.value = clothing;
        opt.textContent = clothing;
        dropdown.appendChild(opt);
    }
}

function addToCart(){
    let item = document.getElementById("itemSelect").value;
    let special = document.getElementById("special").value;
    let qty = document.getElementById("qty").value;

    if(item){
        cart.push(item + " x" + qty);
    }

    if(special){
        cart.push(special + " x" + qty);
    }

    renderCart();
}

function renderCart(){
    let list = document.getElementById("cart");
    list.innerHTML = "";

    cart.forEach(c=>{
        let li = document.createElement("li");
        li.textContent = c;
        list.appendChild(li);
    });

    document.getElementById("cartData").value = cart.join(",");
}

// Prevent empty cart submit
document.getElementById("orderForm").addEventListener("submit",function(e){
    if(cart.length === 0){
        alert("Add at least one item!");
        e.preventDefault();
    }
});
</script>

</body>
</html>
