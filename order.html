<body>
<a href="myorders.php">My Orders</a>
<div class="container">

<h1>Order Dry Cleaning</h1>

<form id="orderForm" action="order_process.php" method="POST">

<!-- STEP 1 -->
<h2>Step 1: Select Items</h2>

<label>Clothing Type</label>
<select id="clothing">
<option value="">Select</option>
<option value="Shirt">Shirt</option>
<option value="T-Shirt">T-Shirt</option>
<option value="Pants">Pants</option>
<option value="Jeans">Jeans</option>
<option value="Other">Other</option>
</select>

<label>Special Items</label>
<select id="special">
<option value="">Select</option>
<option value="Silk Dress">Silk Dress</option>
<option value="Wool Sweater">Wool Sweater</option>
<option value="Cashmere Scarf">Cashmere Scarf</option>
</select>

<label>Quantity</label>
<input type="number" id="qty" min="1" value="1">

<button type="button" onclick="addToCart()">Add Item</button>

<!-- CART -->
<h2>Step 2: Cart</h2>

<p class="counter">Total Items: <span id="count">0</span></p>

<div class="cart-box">
<ul id="cart"></ul>
</div>

<input type="hidden" name="cartData" id="cartData">

<!-- ADDRESS -->
<h2>Step 3: Delivery Details</h2>

<input type="tel" name="phone" pattern="[0-9]{10}" placeholder="Phone Number" required>
<input type="text" name="address" placeholder="Delivery Address" required>

<!-- SUBMIT -->
<h2>Step 4: Submit</h2>
<button type="submit">Place Order</button>

</form>
</div>

<script>
let cart = [];

function addToCart(){
    let clothing = document.getElementById("clothing").value;
    let special = document.getElementById("special").value;
    let qty = document.getElementById("qty").value;

    if(!clothing && !special){
        alert("Select at least one item");
        return;
    }

    if(clothing){
        cart.push(clothing + " x" + qty);
    }

    if(special){
        cart.push(special + " x" + qty);
    }

    renderCart();
}

function renderCart(){
    let list = document.getElementById("cart");
    list.innerHTML = "";

    cart.forEach(c=>{
        let li = document.createElement("li");
        li.textContent = c;
        list.appendChild(li);
    });

    document.getElementById("cartData").value = cart.join(",");
    document.getElementById("count").textContent = cart.length;
}

// Prevent empty cart
document.getElementById("orderForm").addEventListener("submit",function(e){
    if(cart.length === 0){
        alert("Add at least one item!");
        e.preventDefault();
    }
});
</script>

</body>
